// ──────────────────────────────────────────────────────────────
// GUESS THAT FOREHEAD
// A single-file party game. Upload celebrity photos, drag a crop box
// over the forehead, then play: forehead first → reveal face.
//
// The image pool persists in this browser via localStorage, so a
// refresh or accidental tab-close won't wipe your uploads. (In the
// Claude artifact preview, storage is blocked and this safely no-ops;
// once deployed to a real URL, persistence works normally.)
// ──────────────────────────────────────────────────────────────

// ──────────────────────────────────────────────────────────────
// FIREBASE — shared cloud pool (Firestore-only, no Storage needed)
// To stay 100% free on the Spark plan with no credit card, we DON'T
// use Cloud Storage (which now requires a billing plan). Instead we
// compress each photo to a small JPEG and store it directly inside the
// Firestore document. Firestore docs cap at ~1MB, so compressImage()
// shrinks photos to fit comfortably. Everyone in the same room shares
// the pool, and it updates live as friends add faces.
// ──────────────────────────────────────────────────────────────

const firebaseConfig = {
  apiKey: "AIzaSyDo9c0TxYt0dfAsA1Jpu6U_OH8yKx7lQPs",

// Initialize once (guard against double-init on hot reloads).
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// A "room" is just a document path. Everyone using the same room code
// shares a pool. Default room keeps it simple; you can add codes later.
const ROOM = "family-night";
const roomCollection = () => db.collection("rooms").doc(ROOM).collection("faces");

// Compress an image File to a JPEG data-URL small enough for Firestore.
// Resizes so the longest side is <= maxDim, then drops JPEG quality until
// the result is under ~700KB (leaving headroom under Firestore's 1MB cap).
function compressImage(file, maxDim = 1280) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);

        let quality = 0.82;
        let dataUrl = canvas.toDataURL("image/jpeg", quality);
        // Step quality down until it fits comfortably under 1MB.
        while (dataUrl.length > 700000 && quality > 0.3) {
          quality -= 0.12;
          dataUrl = canvas.toDataURL("image/jpeg", quality);
        }
        resolve({ dataUrl, w: width, h: height });
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Add a face entry to Firestore (image stored inline as a data-URL).
async function addFace({ src, name, w, h, crop }) {
  await roomCollection().add({
    src,
    name,
    w,
    h,
    crop,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

// Delete a face document.
async function deleteFace(item) {
  await roomCollection().doc(item.id).delete();
}

async function clearAllFaces() {
  const snap = await roomCollection().get();
  await Promise.all(snap.docs.map((d) => roomCollection().doc(d.id).delete()));
}

function GuessThatForehead() {
  const [screen, setScreen] = useState("home"); // home | upload | play
  const [pool, setPool] = useState([]); // live from Firestore
  const [loading, setLoading] = useState(true);

  // Subscribe to the room's faces. Updates automatically as friends add.
  useEffect(() => {
    const unsub = roomCollection()
      .orderBy("createdAt", "asc")
      .onSnapshot(
        (snap) => {
          const next = snap.docs.map((d) => {
            const data = d.data();
            // Map Firestore fields onto the shape the UI already expects.
            return {
              id: d.id,
              src: data.src, // inline JPEG data-URL
              name: data.name,
              w: data.w,
              h: data.h,
              crop: data.crop,
            };
          });
          setPool(next);
          setLoading(false);
        },
        (err) => {
          console.error("Firestore subscribe failed:", err);
          setLoading(false);
        }
      );
    return unsub;
  }, []);

  return (
    <div style={styles.app}>
      <style>{css}</style>
      <div style={styles.grain} />
      <Header pool={pool} onHome={() => setScreen("home")} screen={screen} />

      {screen === "home" && (
        <Home
          pool={pool}
          loading={loading}
          onUpload={() => setScreen("upload")}
          onPlay={() => setScreen("play")}
        />
      )}
      {screen === "upload" && (
        <Upload pool={pool} onDone={() => setScreen("home")} />
      )}
      {screen === "play" && (
        <Play pool={pool} onExit={() => setScreen("home")} />
      )}
    </div>
  );
}

// ── Header ──────────────────────────────────────────────────────
function Header({ pool, onHome, screen }) {

}

// ── Home ────────────────────────────────────────────────────────
function Home({ pool, loading, onUpload, onPlay }) {
  const [clearing, setClearing] = useState(false);
  const clearPool = async () => {
    if (!window.confirm(`Clear all ${pool.length} faces from the shared pool? This removes them for everyone.`)) return;
    setClearing(true);
    try {
      await clearAllFaces();
    } catch (e) {

    }

  return (

          ▶ Play {pool.length > 0 ? `(${pool.length})` : ""}
        </button>
      </div>
      {loading && (
        <p style={styles.hint}>Loading the shared pool…</p>
      )}
      {!loading && pool.length === 0 && (
        <p style={styles.hint}>Add at least one face to start playing.</p>
      )}
      {pool.length > 0 && (
        <button style={styles.clearLink} onClick={clearPool} disabled={clearing}>

        </button>

  );
}

// ── Upload + Crop ───────────────────────────────────────────────
function Upload({ pool, onDone }) {
  const [staged, setStaged] = useState(null); // { src, w, h, file }
  const [crop, setCrop] = useState({ x: 0.3, y: 0.08, w: 0.4, h: 0.18 });
  const [name, setName] = useState("");
  const [uploading, setUploading] = useState(false);
  const imgWrapRef = useRef(null);
  const imgRef = useRef(null);
  const drag = useRef(null);

  const onFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const src = ev.target.result;
      const probe = new Image();
      probe.onload = () => {
        // Keep the raw `file` so we can upload it to Firebase Storage.
        setStaged({ src, w: probe.naturalWidth, h: probe.naturalHeight, file });
        setCrop({ x: 0.3, y: 0.08, w: 0.4, h: 0.18 });
        setName("");
      };
      probe.src = src;
    };
    reader.readAsDataURL(file);
  };

  // Measure pointer position relative to the IMAGE element (not the
  // wrapper). The image is letterboxed inside the wrapper, so using the
  // wrapper's box throws the crop off. Clamp to 0–1 within the image.
  const pointFromEvent = (e) => {
    const el = imgRef.current;
    if (!el) return { px: 0, py: 0 };
    const rect = el.getBoundingClientRect();
    const px = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    const py = clamp((e.clientY - rect.top) / rect.height, 0, 1);
    return { px, py };
  };

  const startDrag = (mode) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    // Capture the pointer so move/up keep firing even if the finger
    // leaves the box — this is what makes dragging actually work on touch.
    e.currentTarget.setPointerCapture?.(e.pointerId);
    const { px, py } = pointFromEvent(e);
    drag.current = { mode, startPx: px, startPy: py, startCrop: { ...crop } };
  };

  const onMove = useCallback((e) => {
    if (!drag.current) return;
    const el = imgRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const px = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    const py = clamp((e.clientY - rect.top) / rect.height, 0, 1);
    const d = drag.current;
    let { x, y, w, h } = d.startCrop;
    if (d.mode === "move") {
      const dx = px - d.startPx;
      const dy = py - d.startPy;
      x = clamp(x + dx, 0, 1 - w);
      y = clamp(y + dy, 0, 1 - h);
    } else if (d.mode === "resize") {
      // Resize from the box's fixed top-left corner: new size is the
      // pointer position minus the origin. Min sizes keep it grabbable.
      w = clamp(px - x, 0.05, 1 - x);
      h = clamp(py - y, 0.04, 1 - y);
    }
    setCrop({ x, y, w, h });
  }, []);

  useEffect(() => {
    const stop = () => (drag.current = null);
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", stop);
    window.addEventListener("pointercancel", stop);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", stop);
      window.removeEventListener("pointercancel", stop);
    };
  }, [onMove]);

  const save = async () => {
    if (uploading) return;
    setUploading(true);
    try {
      // Compress the photo to a small JPEG so it fits inside a Firestore
      // document, then save everything (image + crop + name) in one doc.
      const { dataUrl, w, h } = await compressImage(staged.file);
      await addFace({
        src: dataUrl,
        name: name.trim() || "Mystery celeb",
        w,
        h,
        crop,
      });
      // The live subscription will add it to the pool automatically.
      setStaged(null);
      setName("");
    } catch (err) {
      console.error("Save failed:", err);
      window.alert(
        "Couldn't save. Check your connection and that Firestore is enabled with open rules."
      );
    }
    setUploading(false);
  };

  return (
    <main style={styles.uploadWrap}>
      {!staged ? (
        <label style={styles.dropzone}>
          <input
            type="file"
            accept="image/*"
            onChange={onFile}
            style={{ display: "none" }}
          />
          <div style={styles.dropIcon}>📸</div>
          <div style={styles.dropTitle}>Choose a celebrity photo</div>
          <div style={styles.dropSub}>
            Use a clear, front-facing shot for the best forehead reveal
          </div>
        </label>
      ) : (
        <div style={styles.cropStage}>
          <p style={styles.cropInstruction}>
            Drag the box over just the <strong>forehead</strong>. Drag the
            corner handle to resize.
          </p>
          <div style={styles.imgWrap} ref={imgWrapRef}>
            <img
              ref={imgRef}
              src={staged.src}
              style={styles.cropImg}
              alt="celeb"
              draggable={false}
            />
            <div
              style={{
                ...styles.cropBox,
                left: `${crop.x * 100}%`,
                top: `${crop.y * 100}%`,
                width: `${crop.w * 100}%`,
                height: `${crop.h * 100}%`,
              }}
              onPointerDown={startDrag("move")}
            >
              <div style={styles.cropLabel}>forehead</div>
              <div
                style={styles.cropHandle}
                onPointerDown={startDrag("resize")}
              />
            </div>
          </div>
          <input
            style={styles.nameInput}
            placeholder="Who is it? (shown on the reveal)"
            value={name}
            onChange={(e) => setName(e.target.value)}
          />
          <div style={styles.btnRow}>
            <button
              style={styles.btnSecondary}
              onClick={() => setStaged(null)}
              disabled={uploading}
            >
              Cancel
            </button>
            <button
              style={{ ...styles.btnPrimary, ...(uploading ? styles.btnDisabled : {}) }}
              onClick={save}
              disabled={uploading}
            >
              {uploading ? "Uploading…" : "✓ Add to pool"}
            </button>
          </div>
        </div>
      )}

      {pool.length > 0 && (
        <div style={styles.thumbStrip}>
          {pool.map((p) => (
            <Thumb
              key={p.id}
              item={p}
              onRemove={() => {
                if (window.confirm(`Remove "${p.name}" for everyone?`)) {
                  deleteFace(p).catch(() => window.alert("Couldn't remove — check connection."));
                }
              }}
            />
          ))}
        </div>
      )}

      <button style={styles.doneBtn} onClick={onDone}>
        Done — back to menu
      </button>
    </main>
  );
}

function Thumb({ item, onRemove }) {
  return (
    <div style={styles.thumb}>
      <div style={styles.thumbCrop}>
        <CropView item={item} />
      </div>
      <button style={styles.thumbX} onClick={onRemove}>×</button>
    </div>
  );
}

// CropView — shows the cropped region of the REAL image, undistorted.
// The container takes the crop's true pixel aspect ratio. Inside it, the
// image is laid out at the container's exact width/height (so it has a
// known box), then scaled up and shifted with a CSS transform. Transforms
// resolve against the element's OWN box, so there is no cross-axis
// percentage confusion — this is the reliable way to do it.
function CropView({ item, radius = 0, fit = "width" }) {
  const { crop, w: imgW = 1, h: imgH = 1 } = item;
  const cropAspect = (crop.w * imgW) / (crop.h * imgH);
  const sizeStyle =
    fit === "height"
      ? { height: "100%", aspectRatio: cropAspect }
      : { width: "100%", aspectRatio: cropAspect };
  // Scale so the crop region fills the window, then translate the image
  // so the crop's top-left corner lands at the window's origin.
  const scaleX = 1 / crop.w;
  const scaleY = 1 / crop.h;
  const txPct = -(crop.x / crop.w) * 100;
  const tyPct = -(crop.y / crop.h) * 100;
  return (
    <div
      style={{
        position: "relative",
        ...sizeStyle,
        overflow: "hidden",
        borderRadius: radius,
        background: "#000",
      }}
    >
      <img
        src={item.src}
        alt=""
        draggable={false}
        style={{
          position: "absolute",
          top: 0,
          left: 0,
          width: "100%",
          height: "100%",
          // translate first (in % of the image's own box), then scale
          transform: `translate(${txPct}%, ${tyPct}%) scale(${scaleX}, ${scaleY})`,
          transformOrigin: "top left",
          display: "block",
        }}
      />
    </div>
  );
}

// ── Play ────────────────────────────────────────────────────────
function Play({ pool, onExit }) {
  const [order] = useState(() => shuffle(pool));
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);

  const item = order[idx];
  const done = idx >= order.length;

  if (done) {
    return (
      <main style={styles.center}>
        <div style={styles.heroBrow}>🎉</div>
        <p style={styles.tagline}>That's everyone! Nice foreheads all around.</p>
        <div style={styles.btnRow}>
          <button style={styles.btnPrimary} onClick={() => { setIdx(0); setRevealed(false); }}>
            ↻ Play again
          </button>
          <button style={styles.btnSecondary} onClick={onExit}>
            Back to menu
          </button>
        </div>
      </main>
    );
  }

  const next = () => {
    setRevealed(false);
    setIdx(idx + 1);
  };

  return (
    <main style={styles.playWrap}>
      <div style={styles.progress}>
        {idx + 1} / {order.length}
      </div>

      <div style={styles.stageCard}>
        {!revealed ? (
          <div style={styles.foreheadView}>
            <CropView item={item} radius={20} />
            <div style={styles.slideTag}>FOREHEAD</div>
          </div>
        ) : (
          <div style={styles.revealView}>
            <img src={item.src} style={styles.revealImg} alt="reveal" />
            <div style={styles.revealName}>{item.name}</div>
          </div>
        )}
      </div>

      {!revealed ? (
        <button style={styles.btnPrimary} onClick={() => setRevealed(true)}>
          👀 Reveal face
        </button>
      ) : (
        <button style={styles.btnPrimary} onClick={next}>
          {idx + 1 < order.length ? "Next →" : "Finish 🎉"}
        </button>
      )}
      <button style={styles.exitLink} onClick={onExit}>
        Quit game
      </button>
    </main>
  );
}

// ── helpers ─────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
