<style>
  html {
    /* Put the brand gradient on the ROOT element. This is the layer iOS
       reveals during the rubber-band overscroll bounce, so pulling past
       the top or bottom now shows the gradient instead of white/flat.
       Fixed + a dark fallback color guarantees no white ever flashes. */
    background-color: #0c0a14;
    background: radial-gradient(circle at 20% 10%, #1a1530 0%, #0c0a14 55%) #0c0a14;
    background-attachment: fixed;
    min-height: 100%;
  }
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    /* Transparent so the html gradient shows through everywhere, including
       the overscroll zone. */
    background: transparent;
    overscroll-behavior: none;
  }
  /* Let the app paint edge-to-edge; the React layout already keeps its
     own controls clear of the notch via normal flow. */
  #root { min-height: 100vh; }
</style>

// compress each photo to a small JPEG and store it directly inside the
// Firestore document. Firestore docs cap at ~1MB, so compressImage()
// shrinks photos to fit comfortably. Everyone in the same room shares
// the pool, and it updates live as friends add faces.
// ──────────────────────────────────────────────────────────────

// A "room" is just a document path keyed by the password players type.
// Everyone who enters the same password shares one pool; different
// passwords are completely separate pools. This is a shared-secret model
// (like a game PIN) — good for keeping groups separate and randos out,
// but it is NOT strong authentication. Don't reuse an important password.
const ROOM_KEY = "gtf_room_v1"; // remembers the room on this device
const DEFAULT_ROOM = "public-lobby"; // the open room everyone shares by default

// Turn a typed password into a safe Firestore document id (no slashes,
// spaces, or other illegal path chars; lowercased so "Family" == "family").
function roomIdFromPassword(pw) {
  return (pw || "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_-]/g, "-") // illegal path chars -> dash
    .slice(0, 80) || "default";
}

// Collection of faces for a given room id.
const roomCollectionFor = (roomId) =>
  db.collection("rooms").doc(roomId).collection("faces");

// Compress an image File to a JPEG data-URL small enough for Firestore.
// Resizes so the longest side is <= maxDim, then drops JPEG quality until
// the result is under ~700KB (leaving headroom under Firestore's 1MB cap).
function compressImage(file, maxDim = 1280) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);

        let quality = 0.82;
        let dataUrl = canvas.toDataURL("image/jpeg", quality);
        // Step quality down until it fits comfortably under 1MB.
        while (dataUrl.length > 700000 && quality > 0.3) {
          quality -= 0.12;
          dataUrl = canvas.toDataURL("image/jpeg", quality);
        }
        resolve({ dataUrl, w: width, h: height });
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Add a face entry to Firestore (image stored inline as a data-URL).
async function addFace(roomId, { src, name, w, h, crop }) {
  await roomCollectionFor(roomId).add({
    src,
    name,
    w,
    h,
    crop,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

// Delete a face document.
async function deleteFace(roomId, item) {
  await roomCollectionFor(roomId).doc(item.id).delete();
}

async function clearAllFaces(roomId) {
  const snap = await roomCollectionFor(roomId).get();
  await Promise.all(
    snap.docs.map((d) => roomCollectionFor(roomId).doc(d.id).delete())
  );
}

function GuessThatForehead() {
  const [screen, setScreen] = useState("home"); // home | upload | play | howto
  const [pool, setPool] = useState([]); // live from Firestore
  const [loading, setLoading] = useState(true);

  // The room the player is in. Defaults to the shared public lobby so anyone
  // can jump in with zero setup; they can opt into a private password room.
  // Remembered on this device so it auto-rejoins the same room each launch.
  const [roomId, setRoomId] = useState(() => {
    try {
      return localStorage.getItem(ROOM_KEY) || DEFAULT_ROOM;
    } catch {
      return DEFAULT_ROOM;
    }
  });

  const enterRoom = (password) => {
    const id = roomIdFromPassword(password);
    try {
      localStorage.setItem(ROOM_KEY, id);
    } catch {}
    setLoading(true);
    setPool([]);
    setRoomId(id);
    setScreen("home");
  };

  // Return to the shared public lobby.
  const leaveRoom = () => {
    try {
      localStorage.removeItem(ROOM_KEY);
    } catch {}
    setLoading(true);
    setPool([]);
    setRoomId(DEFAULT_ROOM);
    setScreen("home");
  };

  // Subscribe to the CURRENT room's faces. Re-subscribes whenever the room
  // changes.
  useEffect(() => {
    if (!roomId) return;
    const unsub = roomCollectionFor(roomId)
      .orderBy("createdAt", "asc")
      .onSnapshot(
        (snap) => {
          const next = snap.docs.map((d) => {
            const data = d.data();
            // Map Firestore fields onto the shape the UI already expects.
            return {
              id: d.id,
              src: data.src, // inline JPEG data-URL
              name: data.name,
              w: data.w,
              h: data.h,
              crop: data.crop,
            };
          });
          setPool(next);
          setLoading(false);
        },
        (err) => {
          console.error("Firestore subscribe failed:", err);
          setLoading(false);
        }
      );
    return unsub;
  }, [roomId]);

  return (
    <div style={styles.app}>
      <style>{css}</style>
      <div style={styles.grain} />
      <Header pool={pool} onHome={() => setScreen("home")} screen={screen} />

      {screen === "home" && (
        <Home
          pool={pool}
          loading={loading}
          roomId={roomId}
          onUpload={() => setScreen("upload")}
          onPlay={() => setScreen("play")}
          onHowTo={() => setScreen("howto")}
          onJoinRoom={() => setScreen("room")}
          onLeaveRoom={leaveRoom}
          isPrivate={roomId !== DEFAULT_ROOM}
        />
      )}
      {screen === "room" && (
        <RoomGate
          current={roomId}
          onEnter={enterRoom}
          onBack={() => setScreen("home")}
        />
      )}
      {screen === "howto" && (
        <HowToPlay onBack={() => setScreen("home")} />
      )}
      {screen === "upload" && (
        <Upload pool={pool} roomId={roomId} onDone={() => setScreen("home")} />
      )}
      {screen === "play" && (
        <Play pool={pool} onExit={() => setScreen("home")} />
      )}
    </div>
  );
}

// ── Upload + Crop ───────────────────────────────────────────────
function Upload({ pool, roomId, onDone }) {
  const [staged, setStaged] = useState(null); // { src, w, h, file }
  const [crop, setCrop] = useState({ x: 0.3, y: 0.08, w: 0.4, h: 0.18 });
  const [name, setName] = useState("");
  const [uploading, setUploading] = useState(false);
  const imgWrapRef = useRef(null);
  const imgRef = useRef(null);
  const drag = useRef(null);

  const onFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const src = ev.target.result;
      const probe = new Image();
      probe.onload = () => {
        // Keep the raw `file` so we can upload it to Firebase Storage.
        setStaged({ src, w: probe.naturalWidth, h: probe.naturalHeight, file });
        setCrop({ x: 0.3, y: 0.08, w: 0.4, h: 0.18 });
        setName("");
      };
      probe.src = src;
    };
    reader.readAsDataURL(file);
  };

  // Measure pointer position relative to the IMAGE element (not the
  // wrapper). The image is letterboxed inside the wrapper, so using the
  // wrapper's box throws the crop off. Clamp to 0–1 within the image.
  const pointFromEvent = (e) => {
    const el = imgRef.current;
    if (!el) return { px: 0, py: 0 };
    const rect = el.getBoundingClientRect();
    const px = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    const py = clamp((e.clientY - rect.top) / rect.height, 0, 1);
    return { px, py };
  };

  const startDrag = (mode) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    // Capture the pointer so move/up keep firing even if the finger
    // leaves the box — this is what makes dragging actually work on touch.
    e.currentTarget.setPointerCapture?.(e.pointerId);
    const { px, py } = pointFromEvent(e);
    drag.current = { mode, startPx: px, startPy: py, startCrop: { ...crop } };
  };

  const onMove = useCallback((e) => {
    if (!drag.current) return;
    const el = imgRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const px = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    const py = clamp((e.clientY - rect.top) / rect.height, 0, 1);
    const d = drag.current;
    let { x, y, w, h } = d.startCrop;
    if (d.mode === "move") {
      const dx = px - d.startPx;
      const dy = py - d.startPy;
      x = clamp(x + dx, 0, 1 - w);
      y = clamp(y + dy, 0, 1 - h);
    } else if (d.mode === "resize") {
      // Resize from the box's fixed top-left corner: new size is the
      // pointer position minus the origin. Min sizes keep it grabbable.
      w = clamp(px - x, 0.05, 1 - x);
      h = clamp(py - y, 0.04, 1 - y);
    }
    setCrop({ x, y, w, h });
  }, []);

  useEffect(() => {
    const stop = () => (drag.current = null);
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", stop);
    window.addEventListener("pointercancel", stop);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", stop);
      window.removeEventListener("pointercancel", stop);
    };
  }, [onMove]);

  const save = async () => {
    if (uploading) return;
    setUploading(true);
    try {
      // Compress the photo to a small JPEG so it fits inside a Firestore
      // document, then save everything (image + crop + name) in one doc.
      const { dataUrl, w, h } = await compressImage(staged.file);
      await addFace(roomId, {
        src: dataUrl,
        name: name.trim() || "Mystery celeb",
        w,
        h,
        crop,
      });
      // The live subscription will add it to the pool automatically.
      setStaged(null);
      setName("");
    } catch (err) {
      console.error("Save failed:", err);
      window.alert(
        "Couldn't save. Check your connection and that Firestore is enabled with open rules."
      );
    }
    setUploading(false);
  };

  return (
    <main style={styles.uploadWrap}>
      {!staged ? (
        <label style={styles.dropzone}>
          <input
            type="file"
            accept="image/*"
            onChange={onFile}
            style={{ display: "none" }}
          />
          <div style={styles.dropIcon}>📸</div>
          <div style={styles.dropTitle}>Choose a celebrity photo</div>
          <div style={styles.dropSub}>
            Use a clear, front-facing shot for the best forehead reveal
          </div>
        </label>
      ) : (
        <div style={styles.cropStage}>
          <p style={styles.cropInstruction}>
            Drag the box over just the <strong>forehead</strong>. Drag the
            corner handle to resize.
          </p>
          <div style={styles.imgWrap} ref={imgWrapRef}>
            <img
              ref={imgRef}
              src={staged.src}
              style={styles.cropImg}
              alt="celeb"
              draggable={false}
            />
            <div
              style={{
                ...styles.cropBox,
                left: `${crop.x * 100}%`,
                top: `${crop.y * 100}%`,
                width: `${crop.w * 100}%`,
                height: `${crop.h * 100}%`,
              }}
              onPointerDown={startDrag("move")}
            >
              <div style={styles.cropLabel}>forehead</div>
              <div
                style={styles.cropHandle}
                onPointerDown={startDrag("resize")}
              />
            </div>
          </div>
          <input
            style={styles.nameInput}
            placeholder="Who is it? (shown on the reveal)"
            value={name}
            onChange={(e) => setName(e.target.value)}
          />
          <div style={styles.btnRow}>
            <button
              style={styles.btnSecondary}
              onClick={() => setStaged(null)}
              disabled={uploading}
            >
              Cancel
            </button>
            <button
              style={{ ...styles.btnPrimary, ...(uploading ? styles.btnDisabled : {}) }}
              onClick={save}
              disabled={uploading}
            >
              {uploading ? "Uploading…" : "✓ Add to pool"}
            </button>
          </div>
        </div>
      )}

      {pool.length > 0 && (
        <div style={styles.thumbStrip}>
          {pool.map((p) => (
            <Thumb
              key={p.id}
              item={p}
              onRemove={() => {
                if (window.confirm(`Remove "${p.name}" for everyone?`)) {
                  deleteFace(roomId, p).catch(() => window.alert("Couldn't remove — check connection."));
                }
              }}
            />
          ))}
        </div>
      )}

      <button style={styles.doneBtn} onClick={onDone}>
        Done! Back to menu
      </button>
    </main>
  );
}

function Thumb({ item, onRemove }) {
  return (
    <div style={styles.thumb}>
      <div style={styles.thumbCrop}>
        <CropView item={item} />
      </div>
      <button style={styles.thumbX} onClick={onRemove}>×</button>
    </div>
  );
}

// CropView — shows the cropped region of the REAL image, undistorted.
// The container takes the crop's true pixel aspect ratio. Inside it, the
// image is laid out at the container's exact width/height (so it has a
// known box), then scaled up and shifted with a CSS transform. Transforms
// resolve against the element's OWN box, so there is no cross-axis
// percentage confusion — this is the reliable way to do it.
function CropView({ item, radius = 0, fit = "width" }) {
  const { crop, w: imgW = 1, h: imgH = 1 } = item;
  const cropAspect = (crop.w * imgW) / (crop.h * imgH);
  const sizeStyle =
    fit === "height"
      ? { height: "100%", aspectRatio: cropAspect }
      : { width: "100%", aspectRatio: cropAspect };
  // Scale so the crop region fills the window, then translate the image
  // so the crop's top-left corner lands at the window's origin.
  const scaleX = 1 / crop.w;
  const scaleY = 1 / crop.h;
  const txPct = -(crop.x / crop.w) * 100;
  const tyPct = -(crop.y / crop.h) * 100;
  return (
    <div
      style={{
        position: "relative",
        ...sizeStyle,
        overflow: "hidden",
        borderRadius: radius,
        background: "#000",
      }}
    >
      <img
        src={item.src}
        alt=""
        draggable={false}
        style={{
          position: "absolute",
          top: 0,
          left: 0,
          width: "100%",
          height: "100%",
          // translate first (in % of the image's own box), then scale
          transform: `translate(${txPct}%, ${tyPct}%) scale(${scaleX}, ${scaleY})`,
          transformOrigin: "top left",
          display: "block",
        }}
      />
    </div>
  );
}

// ── Play ────────────────────────────────────────────────────────
function Play({ pool, onExit }) {
  // Play in upload order (the pool already arrives sorted by createdAt).
  const [order] = useState(() => [...pool]);
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);

  const item = order[idx];
  const done = idx >= order.length;

  if (done) {
    return (
      <main style={styles.center}>
        <div style={styles.heroBrow}>🎉</div>
        <p style={styles.tagline}>That's everyone! Nice foreheads all around.</p>
        <div style={styles.btnRow}>
          <button style={styles.btnPrimary} onClick={() => { setIdx(0); setRevealed(false); }}>
            ↻ Play again
          </button>
          <button style={styles.btnSecondary} onClick={onExit}>
            Back to menu
          </button>
        </div>
      </main>
    );
  }

  const next = () => {
    setRevealed(false);
    setIdx(idx + 1);
  };

  return (
    <main style={styles.playWrap}>
      <div style={styles.progress}>
        {idx + 1} / {order.length}
      </div>

      <div style={styles.stageCard}>
        {!revealed ? (
          <div style={styles.foreheadView}>
            <CropView item={item} radius={20} />
            <div style={styles.slideTag}>FOREHEAD</div>
          </div>
        ) : (
          <div style={styles.revealView}>
            <img src={item.src} style={styles.revealImg} alt="reveal" />
            <div style={styles.revealName}>{item.name}</div>
          </div>
        )}
      </div>

      {!revealed ? (
        <button style={styles.btnPrimary} onClick={() => setRevealed(true)}>
          👀 Reveal face
        </button>
      ) : (
        <button style={styles.btnPrimary} onClick={next}>
          {idx + 1 < order.length ? "Next →" : "Finish 🎉"}
        </button>
      )}
      <button style={styles.exitLink} onClick={onExit}>
        Quit game
      </button>
    </main>
  );
}

// ── helpers ─────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
